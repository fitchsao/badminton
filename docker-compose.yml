services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: badminton
      POSTGRES_PASSWORD: ${DB_PASSWORD:-badminton_pwd}
      POSTGRES_DB: badminton
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badminton"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://badminton:${DB_PASSWORD:-badminton_pwd}@db:5432/badminton
    depends_on:
      db:
        condition: service_healthy
    ports:
      # 只绑本地回环,公网流量统一走 Caddy 反代,后端不直接暴露
      - "127.0.0.1:3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${APP_BASE_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      # 只绑本地回环,公网流量统一走 Caddy 反代
      - "127.0.0.1:8080:80"

volumes:
  pgdata:
